# =============================================================================
# StreetStudio self-hosting stack (Requirement 30.1)
#
# A complete local/self-hosted deployment: the API_Service and background
# workers backed by PostgreSQL, Redis, and an S3-compatible object store
# (MinIO) for media. Copy `.env.example` to `.env` and fill in the secrets
# before running:
#
#   cp docker/.env.example docker/.env
#   docker compose -f docker/docker-compose.yml up -d
#
# The build context is the repository root (`..`) so the multi-stage
# `docker/Dockerfile` can install and compile the whole npm workspace.
#
# Environment variables map to the packages/config schema keys documented in
# `.env.example` (e.g. DATABASE_URL -> database.url).
# =============================================================================

name: streetstudio

services:
  # ---------------------------------------------------------------------------
  # API_Service: REST + WebSocket + Webhook host.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    image: streetstudio/api:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # --- Core config schema mapping (packages/config) ----------------------
      # database.url / redis.url point at the in-stack services by name.
      DATABASE_URL: postgres://${POSTGRES_USER:-streetstudio}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-streetstudio}
      REDIS_URL: redis://redis:6379
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?set AUTH_JWT_SECRET (>=32 chars)}
      HTTP_PORT: ${HTTP_PORT:-8080}
      HTTP_PUBLIC_BASE_URL: ${HTTP_PUBLIC_BASE_URL:-http://localhost:8080}
      INSTANCE_ID: ${INSTANCE_ID:?set INSTANCE_ID (UUID)}
      # --- Optional tuning (secure defaults applied by config when absent) ----
      STORAGE_SIGNED_UPLOAD_TTL_SECONDS: ${STORAGE_SIGNED_UPLOAD_TTL_SECONDS:-900}
      RATE_LIMIT_PER_WINDOW: ${RATE_LIMIT_PER_WINDOW:-100}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      # --- Object storage (MinIO / S3-compatible) ----------------------------
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-streetstudio-media}
      STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-streetstudio}
      STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      STORAGE_FORCE_PATH_STYLE: "true"
      STREETSTUDIO_ROLE: api
    ports:
      - "${HTTP_PORT:-8080}:8080"
    healthcheck:
      # R30.4: health endpoint reflects dependency reachability.
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      # R30.2: startup completes within 60s when config is valid.
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Background workers: media pipeline, webhook delivery retries, scheduler.
  # Same image/artifact as the API, selected via the worker role.
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: worker
    image: streetstudio/worker:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-streetstudio}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-streetstudio}
      REDIS_URL: redis://redis:6379
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?set AUTH_JWT_SECRET (>=32 chars)}
      HTTP_PORT: ${HTTP_PORT:-8080}
      HTTP_PUBLIC_BASE_URL: ${HTTP_PUBLIC_BASE_URL:-http://localhost:8080}
      INSTANCE_ID: ${INSTANCE_ID:?set INSTANCE_ID (UUID)}
      STORAGE_SIGNED_UPLOAD_TTL_SECONDS: ${STORAGE_SIGNED_UPLOAD_TTL_SECONDS:-900}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-streetstudio-media}
      STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-streetstudio}
      STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      STORAGE_FORCE_PATH_STYLE: "true"
      STREETSTUDIO_ROLE: worker

  # ---------------------------------------------------------------------------
  # PostgreSQL — primary datastore (StreetJS PostgreSQL access).
  # For HA, point DATABASE_URL at your managed/clustered endpoint instead
  # (see infrastructure/README.md).
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-streetstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-streetstudio}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streetstudio} -d ${POSTGRES_DB:-streetstudio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — sessions, rate limiting, realtime backplane, job queues.
  # For HA, run Redis Cluster and point REDIS_URL at it (see infrastructure/).
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for media (pluggable storage provider).
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-streetstudio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # One-shot: create the media bucket on first boot.
  # ---------------------------------------------------------------------------
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-streetstudio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-streetstudio-media}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" &&
      mc mb --ignore-existing \"local/$${STORAGE_BUCKET}\" &&
      echo 'Bucket ready';
      "
    restart: "no"

volumes:
  postgres-data:
  redis-data:
  minio-data:
