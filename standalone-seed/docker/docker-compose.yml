# Local development infrastructure for StreetStudio.
# Real services (not fakes): PostgreSQL, Redis, MinIO (S3-compatible), MailHog.
# Credentials here are LOCAL-DEV DEFAULTS ONLY — never use them in production.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: streetstudio
      POSTGRES_PASSWORD: streetstudio
      POSTGRES_DB: streetstudio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streetstudio"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: streetstudio
      MINIO_ROOT_PASSWORD: streetstudio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the default bucket once MinIO is healthy.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 streetstudio streetstudio &&
      mc mb --ignore-existing local/streetstudio &&
      echo 'bucket ready'
      "

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  miniodata:
