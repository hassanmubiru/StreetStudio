<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreetStudio - Video Collaboration Platform</title>
  <meta name="description" content="Record, review, and collaborate on videos with your team. Professional video collaboration made simple.">
  
  <!-- Preload critical fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Favicon and app icons -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  
  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json">
  
  <!-- Theme color for mobile browsers -->
  <meta name="theme-color" content="#2563eb">
  
  <!-- iOS app configuration -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="StreetStudio">
  
  <!-- Security headers -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' ws: wss:;">
  
  <!-- Accessibility improvements -->
  <meta name="color-scheme" content="light dark">
  
  <style>
    /* Critical CSS for loading state */
    * {
      box-sizing: border-box;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      color: #111827;
      background-color: #ffffff;
    }
    
    /* Loading spinner */
    .loading-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      z-index: 9999;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      html, body {
        color: #f9fafb;
        background-color: #111827;
      }
      
      .loading-container {
        background-color: #111827;
      }
      
      .loading-spinner {
        border-color: #374151;
        border-top-color: #3b82f6;
      }
    }
    
    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      .loading-spinner {
        animation: none;
      }
    }
    
    /* High contrast mode */
    @media (prefers-contrast: high) {
      .loading-spinner {
        border-width: 4px;
      }
    }
    
    /* Screen reader only content */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <!-- App root -->
  <div id="app" role="main">
    <!-- Loading state -->
    <div class="loading-container" id="loading">
      <div class="loading-spinner" role="status" aria-label="Loading StreetStudio">
        <span class="sr-only">Loading StreetStudio...</span>
      </div>
    </div>
  </div>
  
  <!-- Screen reader announcements -->
  <div id="announcements" aria-live="polite" aria-atomic="true" class="sr-only"></div>
  <div id="urgent-announcements" aria-live="assertive" aria-atomic="true" class="sr-only"></div>
  
  <!-- Skip links for keyboard navigation -->
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-50 focus:px-4 focus:py-2 focus:bg-blue-600 focus:text-white focus:rounded">
    Skip to main content
  </a>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
